name: sobrenatural-platform

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sobrenatural-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: postgres
      DATABASE_HOST: sobrenatural-db
      DATABASE_PORT: 5432
      DATABASE_NAME: sobrenatural
      DATABASE_USERNAME: sobrenatural
      DATABASE_PASSWORD: sobrenatural123
      DATABASE_SSL: "false"
      APP_KEYS: key1,key2,key3,key4
      API_TOKEN_SALT: api-token-salt
      ADMIN_JWT_SECRET: admin-jwt-secret
      TRANSFER_TOKEN_SALT: transfer-token-salt
      JWT_SECRET: jwt-secret
      PUBLIC_URL: https://admin.sobrenaturalinmobiliaria.com
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sobrenatural-backend.rule=Host(`admin.sobrenaturalinmobiliaria.com`)"
      - "traefik.http.routers.sobrenatural-backend.entrypoints=websecure"
      - "traefik.http.routers.sobrenatural-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.sobrenatural-backend.loadbalancer.server.port=1337"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sobrenatural-frontend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      STRAPI_API_URL: http://sobrenatural-backend-prod:1337
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sobrenatural-frontend.rule=Host(`sobrenaturalinmobiliaria.com`, `www.sobrenaturalinmobiliaria.com`)"
      - "traefik.http.routers.sobrenatural-frontend.entrypoints=websecure"
      - "traefik.http.routers.sobrenatural-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.sobrenatural-frontend.loadbalancer.server.port=3000"

networks:
  dokploy-network:
    external: true
